<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <h1>CSS Animation Exercises</h1>

  <div class="animations">
    <div class="card">
      <div class="loader">
        <div class="load"></div>
      </div>
    </div>

    <div class="card">
      <div class="baller">
        <div class="ball"></div>
      </div>
    </div>
    <div class="card">
      <div class="welcome">
        <span style="animation-delay: 0.0s;">W</span>
        <span style="animation-delay: 0.2s;">E</span>
        <span style="animation-delay: 0.4s;">L</span>
        <span style="animation-delay: 0.6s;">C</span>
        <span style="animation-delay: 0.8s;">O</span>
        <span style="animation-delay: 1.0s;">M</span>
        <span style="animation-delay: 1.2s;">E</span>
      </div>
    </div>

    <div class="card">
      <div class="traffic-light">
        <div class="light red"></div>
        <div class="light yellow"></div>
        <div class="light green"></div>
      </div>
    </div>

  </div>

</body>
</html>
