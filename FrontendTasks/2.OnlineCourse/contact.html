<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Contact - Training Institute</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">Training Institute</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav"> <span class="navbar-toggler-icon"></span></button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto align-items-center">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="courses.html">Courses</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<main class="container py-5">
  <div class="row g-4">
    <div class="col-lg-6">
      <h1 class="h5 mb-3">Contact Us</h1>
      <div id="contactAlert" class="alert alert-success d-none">Your message was sent. We'll respond soon.</div>
      <form id="contactForm" class="card p-4 border-0 shadow-sm">
        <div class="mb-3"><label class="form-label">Name</label><input id="name" class="form-control" required></div>
        <div class="mb-3"><label class="form-label">Email</label><input id="email" type="email" class="form-control" required></div>
        <div class="mb-3"><label class="form-label">Subject</label><input id="subject" class="form-control"></div>
        <div class="mb-3"><label class="form-label">Message</label><textarea id="message" class="form-control" rows="5"></textarea></div>
        <div class="d-flex justify-content-between">
          <button class="btn btn-primary" type="submit">Send Message</button>
          <a href="index.html" class="btn btn-outline-secondary">Back to Home</a>
        </div>
      </form>
    </div>

    <div class="col-lg-6">
      <h2 class="h6 mb-3">Our Location</h2>
      <div class="border rounded-3 mb-3" style="height:320px;display:flex;align-items:center;justify-content:center;background:#f1f1f1">
        Google Map Placeholder
      </div>
      <div class="card p-3">
        <p class="mb-1"><strong>Address:</strong> 123 Training Lane, City</p>
        <p class="mb-1"><strong>Phone:</strong> +1 234 567 890</p>
        <p class="mb-0"><strong>Email:</strong> info@training.example</p>
      </div>
    </div>
  </div>
</main>

<footer class="bg-dark text-white py-4 text-center">&copy; 2024 Training Institute</footer>

<script>
document.getElementById('contactForm').addEventListener('submit', function(e){
  e.preventDefault();
  document.getElementById('contactAlert').classList.remove('d-none');
  this.reset();
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
