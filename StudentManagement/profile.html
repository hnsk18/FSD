<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Student Profile</title>
</head>
<body>
    <video autoplay muted loop id="bg-video">
    <source src="videos/bg.mp4" type="video/mp4">
    </video>
    <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="addstd.html">Add Student</a>
        <a href="viewstd.html">View Students</a>
        <a href="profile.html">Profile</a>
        <a href="editstd.html">Edit Student</a>
        <a href="logout.html">Logout</a>
    </nav>
    <div id="profile-container" class="profile-card">
        <h2>Student Profile</h2>
        <p><strong>Name:</strong> <span id="profile-name"></span></p>
        <p><strong>Roll Number:</strong> <span id="profile-roll"></span></p>
        <p><strong>CGPA:</strong> <span id="profile-cgpa"></span></p>
        <p><strong>Branch:</strong> <span id="profile-branch"></span></p>
        <p><strong>Age:</strong> <span id="profile-age"></span></p>
        <p><strong>Grade:</strong> <span id="profile-grade"></span></p>
        <p><strong>Created At:</strong> <span id="profile-created"></span></p>
        <div class="profile-actions">
            <button id="profile-edit" type="button">Edit</button>
            <button id="profile-delete" type="button">Delete</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
